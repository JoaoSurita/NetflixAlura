<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <input type="checkbox" id="theme-toggle" />
    <label for="theme-toggle" class="toggle-switch"></label>
    <main>
        <!-- seção de título principal -->
        <section class="whoIsWatching">
            <h1>Quem está assistindo?</h1>
        </section>

        <!-- seção de seleção de perfis -->
        <section class="profilesSection">
            <ul class="profiles">
                <!-- cada item é um perfil (avatar + nome) -->
                <li class="profile">
                    <a href="catalogo/catalogo.html"><img src="/assets/img/Perfil1.png" alt="Chapeleiro Maluco"></a>
                    <p>João</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html"><img src="/assets/img/Perfil2.png" alt="Vectrão"></a>
                    <p>Pedro</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html"><img src="/assets/img/Perfil3.png" alt="Cidade"></a>
                    <p>Maria</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html"><img src="/assets/img/Perfil4.png" alt="Caverna"></a>
                    <p>Carlos</p>
                </li>
            </ul>
        </section>
    </main>
    <script src="/assets/js/script.js"></script>
</body>

</html>
