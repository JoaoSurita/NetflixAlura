<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <main>
        <!-- seção de título principal -->
        <section class="whoIsWatching">
            <h1>Quem está assistindo?</h1>
        </section>

        <!-- seção de seleção de perfis -->
        <section class="profilesSection">
            <ul class="profiles">
                <!-- cada item é um perfil (avatar + nome) -->
                <li class="profile">
                    <img src="/assets/img/Perfil1.png" alt="Chapeleiro Maluco">
                    <p>Perfil 1</p>
                </li>
                <li class="profile">
                    <img src="/assets/img/Perfil2.png" alt="Vectrão">
                    <p>Perfil 2</p>
                </li>
                <li class="profile">
                    <img src="/assets/img/Perfil3.png" alt="Cidade">
                    <p>Perfil 3</p>
                </li>
                <li class="profile">
                    <img src="/assets/img/Perfil4.png" alt="Caverna">
                    <p>Perfil 4</p>
                </li>
            </ul>
        </section>
    </main>
</body>

</html>
